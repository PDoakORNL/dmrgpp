name: CI

on:
  push:
    branches:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Release
            shared_libs: OFF
          - build_type: RelWithDebInfo
            shared_libs: ON
          - build_type: Debug
            shared_libs: OFF
            extra_cmake_args: -DCMAKE_DISABLE_FIND_PACKAGE_Boost=ON

    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        path: source

    - name: Set up Spack
      uses: spack/setup-spack@5ab3c91bdefffffad9a7e45d1d156146afebb3a7 # v2.1.1
      with:
        ref: develop      # Spack version (examples: develop, releases/v0.23)
        buildcache: true  # Configure oci://ghcr.io/spack/github-actions-buildcache
        color: true       # Force color output (SPACK_COLOR=always)
        path: spack       # Where to clone Spack

    - name: Install Dependencies
      run: |
        spack -e ${{github.workspace}}/source install

    - name: Configure
      shell: spack-bash {0}
      run: |
        spack env activate ${{github.workspace}}/source
        cmake -S ${{github.workspace}}/source -B ${{github.workspace}}/build -GNinja -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DBUILD_SHARED_LIBS=${{matrix.shared_libs}} -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wno-unused-parameter" -DCMAKE_COMPILE_WARNING_AS_ERROR=ON ${{matrix.extra_cmake_args}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{matrix.build_type}}

    - name: Test
      run: ctest --test-dir ${{github.workspace}}/build -C ${{matrix.build_type}} --output-on-failure

    - name: Install
      run: cmake --install ${{github.workspace}}/build --prefix ${{github.workspace}}/install --config ${{matrix.build_type}}
