name: CI - MacOS 26

on:
  push:
    branches:
  pull_request:
    branches:
      - master

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: macos-26

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: source

    - name: Install Dependencies 
      run: brew install boost hdf5-mpi gsl open-mpi

    - name: Configure
      run: |
        cmake -S ${{github.workspace}}/source \
              -B ${{github.workspace}}/build \
              -GNinja \
              -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
              -DKokkosKernels_ENABLE_TPL_BLAS=ON \
              -DKokkosKernels_ENABLE_TPL_LAPACK=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build

    - name: Test
      run: ctest --test-dir ${{github.workspace}}/build -E ^output3$ -LE Nightly --output-on-failure

    - name: Install
      run: cmake --install ${{github.workspace}}/build --prefix ${{github.workspace}}/install

